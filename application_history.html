<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoApply - Application History</title>
    <link rel="stylesheet" href="theme_styles.css">
    <style>
        body { padding: 40px; background-color: #0F172A; color: #F8FAFC; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { margin-bottom: 24px; color: #10B981; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #334155; }
        th { background: #1E293B; color: #94A3B8; font-weight: 500; cursor: pointer; user-select: none; }
        th:hover { background: #334155; }
        tr:hover { background: rgba(255,255,255,0.02); }
        .empty-state { text-align: center; padding: 40px; color: #94A3B8; }
        .header-actions { display: flex; justify-content: space-between; align-items: center; }
        .export-btn { background: #4F46E5; color: white; padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; }
        select.status-select { background: #1E293B; color: #F8FAFC; border: 1px solid #334155; padding: 4px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-actions">
            <h1>Application Tracker</h1>
            <button id="exportBtn" class="export-btn">Export CSV</button>
        </div>
        
        <div class="card">
            <table id="historyTable">
                <thead>
                    <tr>
                        <th data-sort="company">Company ↕</th>
                        <th data-sort="role">Role ↕</th>
                        <th data-sort="status">Status ↕</th>
                        <th data-sort="date">Date Applied ↕</th>
                    </tr>
                </thead>
                <tbody id="historyTableBody">
                    <!-- Rows injected here -->
                </tbody>
            </table>
            <div id="emptyState" class="empty-state" style="display: none;">
                No applications tracked yet. Use AutoApply to submit an application!
            </div>
        </div>
    </div>
    <script src="local_data_store.js"></script>
    <script src="application_history.js"></script>
</body>
</html>
