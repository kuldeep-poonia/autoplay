<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoApply — Job Scraper</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f172a;
      --surface:   #1e293b;
      --border:    #334155;
      --accent:    #4f8ef7;
      --green:     #22c55e;
      --amber:     #f59e0b;
      --red:       #ef4444;
      --text:      #f1f5f9;
      --sub:       #94a3b8;
      --muted:     #64748b;
    }

    body {
      width: 440px;
      min-height: 540px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .header-left { display: flex; align-items: center; gap: 8px; }
    .logo { font-size: 18px; }
    .header h1 { font-size: 15px; font-weight: 700; color: var(--accent); }

    .badge {
      background: var(--accent);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 9px;
      border-radius: 999px;
    }

    /* ── Scrape button ── */
    .scrape-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: calc(100% - 36px);
      margin: 14px 18px 0;
      padding: 11px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    .scrape-btn:hover:not(:disabled) { background: #3b7de8; }
    .scrape-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── Status bar ── */
    .status {
      margin: 10px 18px 0;
      padding: 9px 13px;
      background: var(--surface);
      border-radius: 8px;
      border-left: 3px solid var(--accent);
      font-size: 12px;
      color: var(--sub);
      min-height: 36px;
    }

    .status.success { border-left-color: var(--green);  color: #86efac; }
    .status.warning { border-left-color: var(--amber);  color: #fcd34d; }
    .status.error   { border-left-color: var(--red);    color: #fca5a5; }

    /* ── Jobs list ── */
    .jobs-list {
      padding: 10px 18px 18px;
      display: flex;
      flex-direction: column;
      gap: 9px;
      max-height: 390px;
      overflow-y: auto;
    }

    .jobs-list::-webkit-scrollbar { width: 4px; }
    .jobs-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; }

    /* ── Job card ── */
    .job-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 14px;
      transition: border-color 0.15s;
    }

    .job-card:hover { border-color: var(--accent); }

    .job-card .jc-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.35;
      margin-bottom: 3px;
    }

    .job-card .jc-company {
      font-size: 11.5px;
      color: var(--sub);
      margin-bottom: 2px;
    }

    .job-card .jc-location {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .jc-actions {
      display: flex;
      gap: 7px;
      align-items: center;
    }

    .btn-fill {
      flex: 1;
      padding: 7px 10px;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-fill:hover { background: #16a34a; }

    .btn-view {
      padding: 7px 10px;
      background: transparent;
      color: var(--sub);
      border: 1px solid var(--border);
      border-radius: 7px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-view:hover { border-color: var(--accent); color: var(--accent); }

    .easy-tag {
      font-size: 10px;
      font-weight: 700;
      color: #93c5fd;
      background: #1e3a5f;
      padding: 2px 7px;
      border-radius: 999px;
      white-space: nowrap;
    }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 44px 20px;
      color: var(--muted);
    }

    .empty .empty-icon { font-size: 38px; margin-bottom: 12px; }
    .empty p { font-size: 12.5px; line-height: 1.7; }

    /* ── Spinner ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-left">
      <span class="logo">⚡</span>
      <h1>AutoApply Jobs</h1>
    </div>
    <span class="badge" id="countBadge">0 jobs</span>
  </div>

  <button class="scrape-btn" id="scrapeBtn">
    <span id="scrapeIcon">🔍</span>
    <span id="scrapeTxt">Scrape Jobs from This Page</span>
  </button>

  <div class="status" id="statusBar">
    Open any job listing page, then click Scrape
  </div>

  <div class="jobs-list" id="jobsList">
    <div class="empty">
      <div class="empty-icon">🎯</div>
      <p>Go to LinkedIn, Naukri, Wellfound,<br>Internshala or any job board<br>and click <strong>Scrape</strong></p>
    </div>
  </div>

  <script src="job_panel.js"></script>
</body>
</html>
